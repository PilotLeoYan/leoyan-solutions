site_name: "LeoYan Solutions⚡"
site_description: "Competitive Programming solutions explained step by step - with code, diagrams and complexity analysis."
site_url: https://PilotLeoYan.github.io/leoyan-solutions/
repo_url: https://github.com/PilotLeoYan/leoyan-solutions
repo_name: PilotLeoYan/leoyan-solutions
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/favicon.png

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: JetBrains Mono
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      lang: en
  - tags: {}
  - minify:
      minify_html: true

hooks:
  - scripts/generate_data.py

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      permalink_title: "Link to this section"
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: PilotLeoYan
      repo: leoyan-solutions
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/extra.js
  - javascripts/code-runner.js

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Problems:
    - problems/index.md
    - A - Math & Greedy:
      - problems/4A-watermelon.md
  - About: about.md

not_in_nav: |
  problems/_template.md

extra:
  author:
    name: "Leonardo Fabyan"
    github: "PilotLeoYan"
    avatar: "https://github.com/PilotLeoYan.png"
    bio: "Competitive programmer documenting Codeforces solutions - step by step, with code and diagrams."
  analytics:
    provider: google
    property: YOUR_GA_ID
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PilotLeoYan
      name: GitHub
